# =============================================================================
# LATTICE — Docker Compose Deployment
# =============================================================================
# Quick-start: `docker compose up -d`
#
# Services:
#   lattice-proxy     — Main proxy server
#   lattice-redis     — Optional Redis session store
#   lattice-prom      — Optional Prometheus scraper
#
# Environment variables (see .env.example):
#   LATTICE_PROVIDER_API_KEY    — Your upstream LLM API key
#   LATTICE_PROVIDER_BASE_URL   — e.g. https://api.openai.com
#   LATTICE_SESSION_STORE       — "memory" or "redis"
#   LATTICE_REDIS_URL           — redis://lattice-redis:6379/0
# =============================================================================

version: "3.8"

services:
  # ------------------------------------------------------------------
  # LATTICE Proxy
  # ------------------------------------------------------------------
  lattice-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: lattice-proxy
    ports:
      - "${LATTICE_PROXY_PORT:-8787}:8787"
      - "${LATTICE_METRICS_PORT:-9090}:9090"
    environment:
      LATTICE_PROVIDER_API_KEY: ${LATTICE_PROVIDER_API_KEY:-}
      LATTICE_PROVIDER_BASE_URL: ${LATTICE_PROVIDER_BASE_URL:-https://api.openai.com}
      LATTICE_SESSION_STORE: ${LATTICE_SESSION_STORE:-memory}
      LATTICE_REDIS_URL: ${LATTICE_REDIS_URL:-redis://lattice-redis:6379/0}
      LATTICE_LOG_LEVEL: ${LATTICE_LOG_LEVEL:-INFO}
      LATTICE_LOG_FORMAT: ${LATTICE_LOG_FORMAT:-json}
      LATTICE_SEMANTIC_CACHE_ENABLED: ${LATTICE_SEMANTIC_CACHE_ENABLED:-true}
      LATTICE_SEMANTIC_CACHE_TTL_SECONDS: ${LATTICE_SEMANTIC_CACHE_TTL_SECONDS:-300}
      LATTICE_TACC_ENABLED: ${LATTICE_TACC_ENABLED:-true}
    depends_on:
      - lattice-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lattice-net

  # ------------------------------------------------------------------
  # Redis — Session store backend (optional)
  # ------------------------------------------------------------------
  lattice-redis:
    image: redis:7-alpine
    container_name: lattice-redis
    ports:
      - "${LATTICE_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - lattice-redis-data:/data
    restart: unless-stopped
    networks:
      - lattice-net

  # ------------------------------------------------------------------
  # Prometheus — Metrics scraper (optional)
  # ------------------------------------------------------------------
  lattice-prom:
    image: prom/prometheus:v2.51
    container_name: lattice-prom
    ports:
      - "${LATTICE_PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - lattice-proxy
    restart: unless-stopped
    networks:
      - lattice-net

volumes:
  lattice-redis-data:

networks:
  lattice-net:
    driver: bridge
